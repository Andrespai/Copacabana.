<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Booth · Copacabana</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;900&family=Space+Mono:wght@400;700&display=swap');
  :root{ --sand:#F3E3C3; --coral:#FF6B4A; --ink:#0A2421; --sun:#FFC94D; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--ink); color:var(--sand); font-family:'Space Mono',monospace; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px 60px; }
  header{ text-align:center; margin-bottom:24px; max-width:640px; }
  .eyebrow{ font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--coral); margin-bottom:10px; }
  h1{ font-family:'Fraunces',serif; font-weight:900; font-size:clamp(28px,6vw,52px); line-height:1.0; }
  h1 em{ font-style:italic; color:var(--sun); }
  .sub{ margin-top:14px; font-size:13px; color:#C9D8D4; line-height:1.6; }
  .stage{ position:relative; width:min(640px,92vw); aspect-ratio:4/3; border-radius:18px; overflow:hidden; background:#000; box-shadow:0 30px 60px -20px rgba(0,0,0,0.6); border:1px solid rgba(255,201,77,0.2); }
  #output{ position:absolute; top:0; left:0; width:100%; height:100%; }
  .status{ position:absolute; top:14px; left:14px; right:14px; font-size:11px; letter-spacing:1px; background:rgba(10,36,33,0.85); backdrop-filter:blur(6px); padding:8px 12px; border-radius:12px; display:flex; align-items:flex-start; gap:8px; z-index:5; }
  .dot{ width:8px; height:8px; border-radius:50%; background:#FF6B4A; flex-shrink:0; margin-top:3px; }
  .dot.ready{ background:#6CCB95; }
  .dot.error{ background:#FF4040; }
  .countdown{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:900; font-size:130px; color:var(--sun); text-shadow:0 0 40px rgba(255,201,77,0.6); pointer-events:none; opacity:0; transition:opacity 0.2s ease; z-index:6; }
  .countdown.show{ opacity:1; }
  .flash{ position:absolute; inset:0; background:white; opacity:0; pointer-events:none; z-index:7; }
  .flash.go{ animation:flashpop 0.4s ease-out; }
  @keyframes flashpop{ 0%{opacity:0.9;} 100%{opacity:0;} }
  .controls{ width:min(640px,92vw); display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; justify-content:center; }
  button{ font-family:'Space Mono',monospace; font-weight:700; font-size:13px; letter-spacing:1px; text-transform:uppercase; padding:14px 26px; border-radius:100px; border:none; cursor:pointer; }
  .primary{ background:var(--coral); color:var(--ink); }
  .primary:disabled{ background:#5a4438; color:#998a7d; cursor:not-allowed; }
  .secondary{ background:transparent; color:var(--sand); border:1px solid rgba(243,227,195,0.3); }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Sala Copacabana</div>
  <h1>Tu foto en <em>Copacabana</em>,<br>directo desde la oficina</h1>
  <p class="sub">Sostén el ala delta, sonríe — aparecerás sobre la playa de Copacabana.</p>
</header>

<div class="stage">
  <canvas id="output"></canvas>
  <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Iniciando…</span></div>
  <div class="countdown" id="countdown"></div>
  <div class="flash" id="flash"></div>
</div>

<div class="controls">
  <button class="primary" id="shootBtn" disabled>Tomar foto</button>
  <button class="secondary" id="flipBtn">Cambiar cámara</button>
  <button class="secondary" id="retryBtn" style="display:none;">Repetir</button>
  <button class="secondary" id="downloadBtn" style="display:none;">Descargar</button>
</div>

<video id="video" autoplay playsinline muted style="position:fixed;left:-9999px;top:0;width:640px;height:480px;"></video>

<script type="module">
import { ImageSegmenter, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById('video');
const canvas = document.getElementById('output');
const ctx = canvas.getContext('2d');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const shootBtn = document.getElementById('shootBtn');
const retryBtn = document.getElementById('retryBtn');
const downloadBtn = document.getElementById('downloadBtn');
const countdownEl = document.getElementById('countdown');
const flashEl = document.getElementById('flash');

let frozen = false;
let frozenDataUrl = null;
let currentFacing = 'user';
let currentStream = null;
let segmenter = null;
let segReady = false;
let camReady = false;
let lastVideoTime = -1;

function setStatus(text, state){
  statusText.textContent = text;
  statusDot.className = 'dot' + (state ? ' '+state : '');
}

function checkReady(){
  if(segReady && camReady){
    setStatus('Listo', 'ready');
    shootBtn.disabled = false;
  }
}

// Fondo: usa copacabana.jpg si existe, si no usa el marco como fallback
let bgImg = new Image();
let bgReady = false;
let useSegmentation = true;

bgImg.crossOrigin = 'anonymous';
bgImg.onload = () => { bgReady = true; };
bgImg.onerror = () => {
  // Sin foto de fondo: fallback a modo marco solamente
  useSegmentation = false;
  bgReady = true;
};
bgImg.src = 'copacabana.jpg';

// Segmentación
async function initSegmenter(){
  try{
    setStatus('Cargando modelo…');
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    segmenter = await ImageSegmenter.createFromOptions(vision, {
      baseOptions:{
        modelAssetPath:"https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite",
        delegate:"CPU"
      },
      runningMode:"VIDEO",
      outputCategoryMask:true,
      outputConfidenceMasks:false
    });
    segReady = true;
    checkReady();
  }catch(e){
    // Si el modelo falla, usamos solo el marco (no bloqueamos la app)
    console.warn('Segmentación no disponible, usando modo marco:', e);
    segReady = true;
    useSegmentation = false;
    checkReady();
  }
}

// Cámara
async function startCamera(){
  try{
    if(currentStream) currentStream.getTracks().forEach(t => t.stop());
    camReady = false;
    shootBtn.disabled = true;
    setStatus('Pidiendo permiso de cámara…');
    const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:currentFacing } });
    currentStream = stream;
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play().then(() => {
        camReady = true;
        checkReady();
      });
    };
  }catch(e){
    setStatus('Error de cámara: '+(e.message||e), 'error');
  }
}

function drawCoverImg(img, w, h){
  const ir = img.width / img.height;
  const cr = w / h;
  let sw, sh, sx, sy;
  if(ir > cr){ sh=img.height; sw=sh*cr; sx=(img.width-sw)/2; sy=0; }
  else { sw=img.width; sh=sw/cr; sx=0; sy=(img.height-sh)/2; }
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
}

function renderLoop(){
  if(!frozen && camReady && video.readyState >= 2){
    if(segReady && useSegmentation && segmenter && video.currentTime !== lastVideoTime){
      lastVideoTime = video.currentTime;
      segmenter.segmentForVideo(video, performance.now(), (result) => {
        drawWithSegmentation(result);
      });
    } else if(!useSegmentation){
      drawFrameMode();
    }
  }
  requestAnimationFrame(renderLoop);
}

function drawWithSegmentation(result){
  const vw = video.videoWidth, vh = video.videoHeight;
  canvas.width = vw; canvas.height = vh;
  const w = vw, h = vh;

  // 1. Fondo de Copacabana
  if(bgReady) drawCoverImg(bgImg, w, h);
  else { ctx.fillStyle='#0A2421'; ctx.fillRect(0,0,w,h); }

  // 2. Máscara: persona = valor < 128 (confirmado por diagnóstico)
  const mask = result.categoryMask;
  const maskData = mask.getAsUint8Array();
  const mw = mask.width, mh = mask.height;

  const personCanvas = document.createElement('canvas');
  personCanvas.width = vw; personCanvas.height = vh;
  const pCtx = personCanvas.getContext('2d');
  pCtx.drawImage(video, 0, 0, vw, vh);

  // Aplicar máscara alfa directamente sobre el video
  const imgData = pCtx.getImageData(0, 0, vw, vh);
  for(let y=0; y<vh; y++){
    for(let x=0; x<vw; x++){
      const mx = Math.round(x * mw / vw);
      const my = Math.round(y * mh / vh);
      const mi = my * mw + mx;
      const pi = (y * vw + x) * 4;
      // persona = valor bajo (< 128)
      const alpha = maskData[mi] < 128 ? 255 : 0;
      imgData.data[pi+3] = alpha;
    }
  }
  pCtx.putImageData(imgData, 0, 0);
  ctx.drawImage(personCanvas, 0, 0);
}

function drawFrameMode(){
  // Fallback: modo marco sin segmentación
  if(video.readyState < 2) return;
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  const w = canvas.width, h = canvas.height;
  const f = Math.round(h * 0.12);
  ctx.drawImage(video, 0, f, w, h-f*2);
  if(bgReady){ ctx.drawImage(bgImg,0,0,bgImg.width,bgImg.height,0,0,w,f); ctx.drawImage(bgImg,0,0,bgImg.width,bgImg.height,0,h-f,w,f); }
  else { ctx.fillStyle='#0E4F4A'; ctx.fillRect(0,0,w,f); ctx.fillRect(0,h-f,w,f); }
  ctx.strokeStyle='rgba(255,201,77,0.9)'; ctx.lineWidth=3; ctx.strokeRect(4,f+2,w-8,h-f*2-4);
  ctx.fillStyle='#F3E3C3'; ctx.font=`bold ${Math.round(f*0.35)}px monospace`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('SALA COPACABANA', w/2, f/2);
}

startCamera();
initSegmenter();
renderLoop();

document.getElementById('flipBtn').addEventListener('click', () => {
  currentFacing = currentFacing === 'user' ? 'environment' : 'user';
  startCamera();
});

shootBtn.addEventListener('click', () => {
  let n = 3;
  shootBtn.disabled = true;
  countdownEl.classList.add('show');
  countdownEl.textContent = n;
  const iv = setInterval(() => {
    n--;
    if(n > 0){ countdownEl.textContent = n; }
    else {
      clearInterval(iv);
      countdownEl.classList.remove('show');
      frozen = true;
      flashEl.classList.add('go');
      setTimeout(() => flashEl.classList.remove('go'), 400);
      frozenDataUrl = canvas.toDataURL('image/jpeg', 0.95);
      retryBtn.style.display = 'inline-block';
      downloadBtn.style.display = 'inline-block';
    }
  }, 800);
});

retryBtn.addEventListener('click', () => {
  frozen = false;
  retryBtn.style.display = 'none';
  downloadBtn.style.display = 'none';
  shootBtn.disabled = false;
});

downloadBtn.addEventListener('click', () => {
  if(!frozenDataUrl) return;
  const a = document.createElement('a');
  a.href = frozenDataUrl;
  a.download = 'copacabana-' + Date.now() + '.jpg';
  a.click();
});
</script>
</body>
</html>
